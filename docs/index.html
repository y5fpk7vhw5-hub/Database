<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Construction DB · iPad</title>
  <style>
    :root{--bg:#f4f6f8;--panel:#fff;--text:#172033;--muted:#697386;--line:#d8dee8;--primary:#145cc8;--good:#0f8a5f;--warn:#b77800;--bad:#b42318;--shadow:0 12px 30px rgba(20,36,64,.08)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}button,input,select,textarea{font:inherit}aside{position:fixed;inset:0 auto 0 0;width:280px;background:#172033;color:#eef4ff;padding:18px 14px;overflow:auto}aside h1{font-size:1.2rem;margin:0}aside small{color:#aeb8c9}nav{display:grid;gap:4px;margin-top:20px}nav button{border:0;text-align:left;padding:10px;border-radius:8px;background:transparent;color:#d8dee8;font-weight:700}nav button.active,nav button:hover{background:rgba(255,255,255,.12);color:#fff}main{margin-left:280px;min-height:100vh;padding:22px}.top{display:flex;gap:12px;justify-content:space-between;align-items:center;margin-bottom:18px}.search{display:flex;gap:8px;flex:1}.search input{width:100%;border:1px solid var(--line);border-radius:8px;padding:11px 12px;background:var(--panel)}.btn,button.primary{border:1px solid var(--line);border-radius:8px;background:var(--panel);padding:10px 12px;font-weight:800;cursor:pointer}.primary{background:var(--primary)!important;border-color:var(--primary)!important;color:#fff!important}.hero,.panel,.metric,.form{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}.hero{padding:22px;margin-bottom:16px}.hero h2{font-size:clamp(1.6rem,3vw,2.8rem);line-height:1.05;margin:0}.hero p{color:var(--muted);margin:8px 0 0}.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:16px}.metric{padding:16px}.metric span{display:block;color:var(--muted)}.metric strong{display:block;font-size:2rem;margin-top:6px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.panel{padding:16px;margin-bottom:16px;overflow:hidden}.panel-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}.panel h3{margin:0;font-size:1.05rem}.table-wrap{overflow:auto}table{border-collapse:collapse;width:100%;min-width:760px;font-size:.92rem}th,td{border-bottom:1px solid var(--line);padding:10px 8px;text-align:left;vertical-align:top}th{background:rgba(20,92,200,.08);color:var(--muted);font-size:.78rem;text-transform:uppercase}.good{color:var(--good);font-weight:900}.warn{color:var(--warn);font-weight:900}.bad{color:var(--bad);font-weight:900}.form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;padding:16px;margin-bottom:16px}.form label{display:grid;gap:6px;color:var(--muted);font-weight:800}.form input,.form select,.form textarea{border:1px solid var(--line);border-radius:8px;padding:10px;background:#fff}.form textarea{min-height:90px;resize:vertical}.form label.wide,.form button{grid-column:1/-1}.empty{padding:14px;color:var(--muted);border:1px dashed var(--line);border-radius:8px}.notice{background:#eaf7f1;color:#096444;border:1px solid #bde7d3;border-radius:8px;padding:12px;margin-bottom:14px}@media(max-width:1000px){aside{position:static;width:auto;max-height:260px}main{margin-left:0}.metrics{grid-template-columns:repeat(2,minmax(0,1fr))}.grid{grid-template-columns:1fr}}@media(max-width:680px){main{padding:14px}.top{flex-direction:column;align-items:stretch}.metrics,.form{grid-template-columns:1fr}}@media print{aside,.top,.form,.panel-head button{display:none!important}main{margin:0;padding:0}.panel,.metric,.hero{box-shadow:none;break-inside:avoid}}
  </style>
</head>
<body>
  <aside>
    <h1>Construction DB</h1>
    <small>A.14002 SSI Flanders · iPad Demo</small>
    <nav id="nav"></nav>
  </aside>
  <main>
    <div class="top">
      <div class="search"><input id="search" placeholder="Suche Vertrag, Zeichnung, Punch, Permit, SEWO ..."><button class="btn" onclick="renderSearch()">Suchen</button></div>
      <button class="btn" onclick="window.print()">PDF / Drucken</button>
      <button class="btn" onclick="resetData()">Demo reset</button>
    </div>
    <div id="app"></div>
  </main>
<script>
const modules = {
  dashboard:{label:'Dashboard'}, contracts:{label:'Vertraege'}, documents:{label:'Dokumente'}, drawings:{label:'Zeichnungen'}, meetings:{label:'Meetings'}, actions:{label:'Actions'}, progress:{label:'Progress'}, daily:{label:'Daily Input'}, sewo:{label:'SEWO'}, permits:{label:'Permits'}, manpower:{label:'Mannstunden'}, hse:{label:'HSE'}, incidents:{label:'Unfallberichte'}, itp:{label:'ITP / Quality'}, mc:{label:'Mechanical Completion'}, punch:{label:'Punch Items'}, photos:{label:'Fotos'}
};
const seed = {
contracts:[['PO-BIL-001','Insulation subcontract','Bilfinger Insulation','valid','green'],['PO-MKL-001','Structural steel subcontract','MKL Stahlbau','valid','yellow'],['PO-JWW-001','Mechanical erection subcontract','JWW Mechanical Erection','valid','yellow'],['PO-PWR-001','Electrical and instrumentation subcontract','Powerspex Electrical & Instrumentation','valid','red']],
documents:[['DOC-HSE-001','Permit to Work Procedure','HSE','A','approved'],['DOC-QA-001','ITP Master Register','Quality','A','for review'],['DOC-COM-001','Subcontract Scope Matrix','Commercial','0','draft']],
drawings:[['ISO-PIP-210-001','Auxiliary piping isometrics package 1','Goodmont Auxiliary Piping','BA5','for construction'],['GA-STE-BA4-001','Structural steel GA BA4','MKL Stahlbau','BA4','approved'],['EWD-ELE-410-001','LV cable tray routing','Powerspex Electrical & Instrumentation','BA4','for review']],
meetings:[['2026-07-01','daily coordination','Daily Construction Coordination','approved','Doosan, JWW, MKL, Goodmont, SpecTech, Powerspex, HSE, QA/QC']],
actions:[['A-001','Powerspex to nominate permanent site representative and attend daily meetings.','Powerspex Electrical & Instrumentation','2026-07-03','high','open'],['A-002','BESIX to confirm workfront release for FRP penetrations.','BESIX','2026-07-04','high','open'],['A-003','JWW to submit mobilisation curve and weekly manpower forecast.','JWW Mechanical Erection','2026-07-05','medium','in progress']],
progress:[['PR-MKL-STEEL','MKL Stahlbau','Stahlbau','t',220,96,12,45,'in progress'],['PR-JWW-BOILER','JWW Mechanical Erection','Kessel','t',480,118,25,30,'in progress'],['PR-GDM-PIPING','Goodmont Auxiliary Piping','Piping','DI',1500,220,18,20,'in progress'],['PR-SPT-FRP','SpecTech FRP Piping','Piping','joint',320,24,10,15,'blocked'],['PR-PWR-TRAY','Powerspex Electrical & Instrumentation','Electrical','m',2600,0,14,10,'open'],['PR-ERS-REF','ERS Refractory','Refractory','m2',900,0,11,0,'not started'],['PR-BIL-INS','Bilfinger Insulation','Insulation','m2',1800,0,10,0,'not started']],
daily:[['2026-07-01','PR-MKL-STEEL','MKL Stahlbau',96,'t',12,'in progress',''],['2026-07-01','PR-JWW-BOILER','JWW Mechanical Erection',118,'t',25,'in progress',''],['2026-07-01','PR-SPT-FRP','SpecTech FRP Piping',24,'joint',8,'blocked','Workfront release pending']],
sewo:[['SEWO-001','Additional temporary sealing for facade openings','BESIX','submitted','under review','not started'],['SEWO-002','Additional scaffold modification for heavy boiler component','JWW Mechanical Erection','approved','approved','in progress']],
permits:[['PTW-2026-001','Hot Work','JWW Mechanical Erection','BA4','2026-07-01','approved'],['PTW-2026-002','Confined Space','Goodmont Auxiliary Piping','BA5','2026-07-02','requested']],
manpower:[['2026-07-01','JWW Mechanical Erection','Kessel','BA4',25,250],['2026-07-01','MKL Stahlbau','Stahlbau','BA4',18,180],['2026-07-01','Goodmont Auxiliary Piping','Piping','BA5',16,160],['2026-07-01','SpecTech FRP Piping','Piping','BA5',8,80],['2026-07-01','Powerspex Electrical & Instrumentation','Electrical','BA4',6,60]],
hse:[], incidents:[], itp:[['ITP-PIP-001','Auxiliary piping erection and test pack ITP','Goodmont Auxiliary Piping','approved',2,4],['ITP-BOI-001','Boiler erection ITP','JWW Mechanical Erection','for review',3,5],['ITP-ELE-001','Cable installation and termination ITP','Powerspex Electrical & Instrumentation','draft',1,3]],
mc:[['MC-BOI-100','Boiler and Furnace MC Package','JWW Mechanical Erection',22,'open'],['MC-PIP-210','Auxiliary Piping MC Package','Goodmont Auxiliary Piping',15,'open'],['MC-ELE-410','LV Electrical MC Package','Powerspex Electrical & Instrumentation',4,'open']],
punch:[['P-0001','Missing torque record at platform BA4','B','MKL Stahlbau','open','2026-07-08'],['P-0002','FRP penetration solution pending','A','SpecTech FRP Piping','open','2026-07-05'],['P-0003','Cable tray route clash with pipe support','B','Powerspex Electrical & Instrumentation','in progress','2026-07-10']],
photos:[]
};
const headers = {
contracts:['Vertrag','Titel','Firma','Status','Risiko'], documents:['Dokument','Titel','Typ','Rev','Status'], drawings:['Zeichnung','Titel','Firma','Area','Status'], meetings:['Datum','Typ','Titel','Status','Teilnehmer'], actions:['Nr','Beschreibung','Firma','Faellig','Prioritaet','Status'], progress:['Code','Firma','Gewerk','Einheit','Baseline','Ist','Gewicht','Plan %','Status'], daily:['Datum','Item','Firma','Menge','Einheit','Mannstunden','Status','Blocker'], sewo:['SEWO','Titel','Firma','Status','Commercial','Ausfuehrung'], permits:['Permit','Typ','Firma','Area','Datum','Status'], manpower:['Datum','Firma','Gewerk','Area','Mitarbeiter','Stunden'], hse:['Datum','Firma','Area','Kategorie','Beschreibung','Status'], incidents:['Datum','Firma','Area','Typ','Schwere','Status'], itp:['ITP','Titel','Firma','Status','Hold','Witness'], mc:['Paket','Titel','Firma','Prozent','Status'], punch:['Punch','Titel','Kategorie','Firma','Status','Faellig'], photos:['Datum','Titel','Firma','Area','Datei']
};
const formModules = new Set(['actions','daily','sewo','permits','manpower','hse','incidents','punch','photos']);
function data(){return JSON.parse(localStorage.getItem('construction-db')||'null')||structuredClone(seed)}
function save(d){localStorage.setItem('construction-db',JSON.stringify(d))}
function resetData(){if(confirm('Demo-Daten zuruecksetzen?')){localStorage.removeItem('construction-db');render(current)}}
let current='dashboard';
function cls(v){v=String(v||'').toLowerCase(); if(['red','blocked','rejected','critical','a'].includes(v))return'bad'; if(['yellow','open','requested','for review','draft','in progress','submitted','under review','high'].includes(v))return'warn'; if(['green','approved','accepted','closed','active','valid'].includes(v))return'good'; return''}
function table(key, rows){if(!rows.length)return'<div class="empty">Keine Eintraege vorhanden.</div>';return `<div class="table-wrap"><table><thead><tr>${headers[key].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td class="${cls(c)}">${escapeHtml(c)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function escapeHtml(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function nav(){document.getElementById('nav').innerHTML=Object.entries(modules).map(([k,m])=>`<button class="${k===current?'active':''}" onclick="render('${k}')">${m.label}</button>`).join('')}
function kpis(d){let tw=0,aw=0,pw=0;d.progress.forEach(r=>{let base=+r[4]||1,actual=+r[5]||0,w=+r[6]||0,plan=+r[7]||0;tw+=w;aw+=Math.min(actual/base,1)*w;pw+=plan/100*w});let actual=aw/(tw||1)*100,plan=pw/(tw||1)*100;return {actual,plan,delta:actual-plan,actions:d.actions.filter(r=>!['closed','accepted'].includes(r[5])).length,punch:d.punch.filter(r=>!['closed','accepted'].includes(r[4])).length,permits:d.permits.filter(r=>['approved','requested'].includes(r[5])).length,sewo:d.sewo.filter(r=>!['closed','accepted','rejected'].includes(r[3])).length,hours:d.manpower.reduce((s,r)=>s+(+r[5]||0),0)}}
function dashboard(){let d=data(),k=kpis(d);let cards=[['Ist-Progress',k.actual.toFixed(1)+'%'],['Plan',k.plan.toFixed(1)+'%'],['Delta',k.delta.toFixed(1)+'%'],['Offene Actions',k.actions],['Offene Punches',k.punch],['Aktive Permits',k.permits],['SEWO offen',k.sewo],['Mannstunden',k.hours]];let byCompany={};d.progress.forEach(r=>{let base=+r[4]||1,actual=+r[5]||0,w=+r[6]||0;(byCompany[r[1]]??={w:0,a:0});byCompany[r[1]].w+=w;byCompany[r[1]].a+=Math.min(actual/base,1)*w});let cp=Object.entries(byCompany).map(([c,o])=>[c,((o.a/(o.w||1))*100).toFixed(1)+'%']);return `<section class="hero"><h2>Zentrale Baustellensteuerung fuer iPad</h2><p>Demo ohne Serverkosten: Daten werden lokal im Browser gespeichert.</p></section><section class="metrics">${cards.map(c=>`<div class="metric"><span>${c[0]}</span><strong>${c[1]}</strong></div>`).join('')}</section><section class="grid"><div class="panel"><h3>Progress je Nachunternehmer</h3>${table('manpower',cp.map(r=>['',r[0],'','', '',r[1]]))}</div><div class="panel"><h3>Naechste Actions</h3>${table('actions',d.actions)}</div></section>`}
function form(key){if(!formModules.has(key))return'';return `<form class="form" onsubmit="addRecord(event,'${key}')">${headers[key].map((h,i)=>`<label class="${i===1?'wide':''}"><span>${h}</span>${i===1?`<textarea name="f${i}"></textarea>`:`<input name="f${i}" ${h==='Datum'||h==='Faellig'?'type="date"':''}>`}</label>`).join('')}<button class="primary">Eintrag speichern</button></form>`}
function addRecord(e,key){e.preventDefault();let d=data();let row=headers[key].map((_,i)=>e.target['f'+i].value);d[key].unshift(row);save(d);render(key)}
function render(key='dashboard'){current=key;nav();let d=data();let app=document.getElementById('app');if(key==='dashboard'){app.innerHTML=dashboard();return}app.innerHTML=`<section class="hero"><h2>${modules[key].label}</h2><p>${formModules.has(key)?'Neue Eintraege werden lokal auf diesem iPad gespeichert.':'Registeransicht aus Demo-Daten.'}</p></section>${form(key)}<div class="panel"><div class="panel-head"><h3>${modules[key].label}</h3><button class="btn" onclick="exportCsv('${key}')">CSV</button></div>${table(key,d[key]||[])}</div>`}
function renderSearch(){let q=document.getElementById('search').value.toLowerCase();let d=data();current='search';nav();let html=`<section class="hero"><h2>Suche: ${escapeHtml(q)}</h2></section>`;Object.keys(headers).forEach(k=>{let rows=(d[k]||[]).filter(r=>r.join(' ').toLowerCase().includes(q));if(rows.length)html+=`<div class="panel"><h3>${modules[k]?.label||k}</h3>${table(k,rows)}</div>`});document.getElementById('app').innerHTML=html||'<div class="empty">Keine Treffer.</div>'}
function exportCsv(key){let d=data(),rows=[headers[key],...(d[key]||[])];let csv=rows.map(r=>r.map(v=>'"'+String(v??'').replaceAll('"','""')+'"').join(';')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=key+'.csv';a.click()}
render();
</script>
</body>
</html>
